<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ศูนย์ข้อมูลสถานการณ์ยาเสพติด จังหวัดหนองบัวลำภู</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;500;600;700;800&family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root{
    --ink:#10203f; --ink2:#3a4a66; --line:#e4e9f2; --bg:#eaeef6; --card:#ffffff; --soft:#f4f7fc;
    --navy:#0f1d3d; --navy2:#1b2f5e;
    --enf:#c0392b; --enfbg:#fdeceb; --tx:#0e8a6b; --txbg:#e6f6f0;
    --watch:#cf8a1e; --watchbg:#fbf2dd; --seize:#2f6fb0; --seizebg:#e8f1fa;
    --muted:#6c7689; --gold:#d8a64a;
    --radius:18px; --shadow:0 1px 2px rgba(16,32,63,.06),0 12px 34px rgba(16,32,63,.08);
    --ic:38px;
  }
  [data-theme="dark"]{
    --ink:#e9edf6; --ink2:#aeb9cf; --line:#26324c; --bg:#0a1120; --card:#121c30; --soft:#18233a;
    --navy:#0a1426; --navy2:#16264a;
    --enf:#e8705f; --enfbg:#2b1a18; --tx:#3fc59b; --txbg:#11261f;
    --watch:#e2b455; --watchbg:#2a2310; --seize:#5f9bd6; --seizebg:#13243a;
    --muted:#8b97ae; --gold:#e0b75e;
    --shadow:0 1px 2px rgba(0,0,0,.35),0 14px 34px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);font-family:'Sarabun',sans-serif;color:var(--ink);transition:.3s background,.3s color}
  .wrap{max-width:1360px;margin:0 auto;padding:0 18px 72px}
  .ic{width:1em;height:1em;flex:none;vertical-align:-.14em}
  /* ===== HERO ===== */
  .hero{background:
        radial-gradient(120% 140% at 85% -10%,rgba(216,166,74,.22),transparent 45%),
        radial-gradient(90% 120% at 0% 120%,rgba(192,57,43,.20),transparent 50%),
        linear-gradient(135deg,var(--navy),var(--navy2));
        color:#eef3ff;border-radius:0 0 26px 26px;padding:22px 26px 24px;margin-bottom:18px;
        box-shadow:0 18px 40px rgba(15,29,61,.28);position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;inset:0;background:
        repeating-linear-gradient(90deg,rgba(255,255,255,.03) 0 1px,transparent 1px 46px);pointer-events:none}
  .hbar{display:flex;align-items:center;gap:15px;flex-wrap:wrap;position:relative}
  .crest{width:54px;height:54px;border-radius:15px;background:linear-gradient(135deg,#fff,#dfe7f7);
          display:grid;place-items:center;color:var(--navy);font-family:'Kanit';font-weight:800;font-size:20px;
          box-shadow:0 6px 18px rgba(0,0,0,.25);letter-spacing:-.5px}
  .htxt h1{font-family:'Kanit';font-weight:700;font-size:clamp(1.12rem,4.2vw,1.5rem);margin:0;line-height:1.18;letter-spacing:-.01em}
  .htxt p{margin:4px 0 0;color:#aebede;font-size:.85rem;display:flex;align-items:center;gap:7px}
  .htools{margin-left:auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .live{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;color:#cdd9f2;
        background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);padding:7px 13px;border-radius:30px}
  .pulse{width:9px;height:9px;border-radius:50%;background:#36d39e;box-shadow:0 0 0 0 rgba(54,211,158,.6);animation:pulse 2.2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(54,211,158,.5)}70%{box-shadow:0 0 0 9px rgba(54,211,158,0)}100%{box-shadow:0 0 0 0 rgba(54,211,158,0)}}
  .hbtn{font-family:'Kanit';font-weight:600;font-size:.83rem;border:1px solid rgba(255,255,255,.18);
        background:rgba(255,255,255,.07);color:#eaf0ff;padding:8px 14px;border-radius:11px;cursor:pointer;
        text-decoration:none;display:inline-flex;align-items:center;gap:7px;transition:.15s;font-size:.84rem}
  .hbtn .ic{font-size:1rem}
  .hbtn:hover{background:rgba(255,255,255,.16)}
  .hbtn.cta{background:var(--gold);color:#3a2a08;border-color:var(--gold)}
  .hbtn.cta:hover{filter:brightness(1.07)}
  /* ribbon headline */
  .ribbon{margin-top:18px;display:flex;gap:10px;flex-wrap:wrap;position:relative}
  .rcell{flex:1 1 150px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);
         border-radius:13px;padding:11px 15px;backdrop-filter:blur(4px)}
  .rcell .rl{font-size:.72rem;color:#a9bbe0;display:flex;align-items:center;gap:6px}
  .rcell .rl .ic{font-size:.95rem;color:var(--gold)}
  .rcell .rv{font-family:'Kanit';font-weight:700;font-size:1.32rem;margin-top:2px;font-variant-numeric:tabular-nums}
  .rcell .ru{font-size:.7rem;color:#9fb1d8;font-weight:400}
  /* ===== filters ===== */
  .filters{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;background:var(--card);border:1px solid var(--line);
           border-radius:var(--radius);box-shadow:var(--shadow);padding:15px 18px;margin-bottom:18px}
  .filters .fld{display:flex;flex-direction:column;gap:5px}
  .filters label{font-size:.73rem;font-weight:600;color:var(--muted)}
  .filters select{padding:9px 13px;border:1px solid var(--line);border-radius:11px;background:var(--soft);
                  color:var(--ink);font-family:inherit;font-size:.9rem;min-width:150px}
  .updtxt{margin-left:auto;font-size:.78rem;color:var(--muted);align-self:center;display:flex;align-items:center;gap:6px}
  /* ===== AI ===== */
  .ai{background:linear-gradient(135deg,#13234a,#21407e);color:#eaf0ff;border-radius:var(--radius);
      box-shadow:var(--shadow);padding:22px 26px;margin-bottom:18px;position:relative;overflow:hidden}
  [data-theme="dark"] .ai{background:linear-gradient(135deg,#0e1a33,#1a2e58)}
  .ai::after{content:"";position:absolute;right:-30px;top:-40px;width:200px;height:200px;border-radius:50%;
             background:radial-gradient(circle,rgba(216,166,74,.16),transparent 70%)}
  .ai h2{font-family:'Kanit';font-weight:600;font-size:1.06rem;margin:0;display:flex;align-items:center;gap:10px}
  .ai h2 .iccirc{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.13);display:grid;place-items:center}
  .ai h2 .iccirc .ic{font-size:1.15rem;color:var(--gold)}
  .ai .badge{font-size:.65rem;background:rgba(255,255,255,.16);padding:3px 10px;border-radius:20px;font-weight:500}
  .ai .period{font-size:.8rem;opacity:.82;margin:6px 0 14px;padding-left:44px}
  .ai .body{font-size:.96rem;line-height:1.78}
  .ai .body b{color:#fff} .ai .hl{color:var(--gold);font-weight:600}
  .ai .body .ln{display:block;margin:8px 0;padding-left:24px;position:relative}
  .ai .body .ln::before{content:"";position:absolute;left:6px;top:9px;width:7px;height:7px;border-radius:50%;
        background:#7fa0e6;box-shadow:0 0 0 3px rgba(127,160,230,.2)}
  .ai .body .ln.warn::before{background:var(--gold);box-shadow:0 0 0 3px rgba(216,166,74,.25)}
  .ai .copybtn{position:absolute;top:20px;right:22px;font-family:'Kanit';font-size:.78rem;font-weight:600;
        background:rgba(255,255,255,.14);color:#fff;border:none;padding:8px 15px;border-radius:10px;cursor:pointer;
        display:inline-flex;align-items:center;gap:6px}
  .ai .copybtn:hover{background:rgba(255,255,255,.27)}
  .ai .aibtns{position:absolute;top:18px;right:20px;display:flex;gap:8px;z-index:2}
  .ai .aibtns .copybtn{position:static}
  /* ===== KPI ===== */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px}
  @media(max-width:680px){.kpis{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:380px){.kpis{grid-template-columns:1fr}}
  .kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);
       padding:16px 17px;display:flex;gap:14px;align-items:flex-start;position:relative;overflow:hidden;transition:.2s}
  .kpi:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(16,32,63,.1),0 18px 40px rgba(16,32,63,.1)}
  .kpi .ibox{width:var(--ic);height:var(--ic);border-radius:12px;display:grid;place-items:center;flex:none}
  .kpi .ibox .ic{font-size:1.3rem}
  .kpi .kmain{flex:1;min-width:0}
  .kpi .k-top{font-size:.8rem;color:var(--muted);font-weight:600;line-height:1.2}
  .kpi .k-val{font-family:'Kanit';font-weight:700;font-size:1.7rem;line-height:1.15;margin:5px 0 1px;font-variant-numeric:tabular-nums}
  .kpi .k-unit{font-size:.7rem;color:var(--muted);font-weight:400}
  .kpi .k-delta{font-size:.74rem;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .up{color:var(--enf)} .down{color:var(--tx)} .flat{color:var(--muted)}
  .i-enf{background:var(--enfbg);color:var(--enf)} .i-tx{background:var(--txbg);color:var(--tx)}
  .i-watch{background:var(--watchbg);color:var(--watch)} .i-seize{background:var(--seizebg);color:var(--seize)}
  /* ===== cards ===== */
  .row{display:grid;gap:16px;margin-bottom:18px}
  .row.r2{grid-template-columns:1.25fr 1fr} .row.r2b{grid-template-columns:1fr 1fr}
  @media(max-width:980px){.row.r2,.row.r2b{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px}
  .card h3{font-family:'Kanit';font-weight:600;font-size:1.02rem;margin:0;display:flex;align-items:center;gap:9px}
  .card h3 .ic{font-size:1.2rem;color:var(--seize)}
  .card .csub{color:var(--muted);font-size:.8rem;margin:3px 0 16px;padding-left:30px}
  /* progress */
  .goal{margin-bottom:20px}.goal:last-child{margin-bottom:0}
  .goal .glabel{display:flex;justify-content:space-between;align-items:baseline;font-size:.88rem;margin-bottom:8px}
  .goal .glabel .gname{font-weight:600;font-family:'Kanit';display:flex;align-items:center;gap:7px}
  .goal .glabel .gnum{font-variant-numeric:tabular-nums;color:var(--muted)}
  .goal .gnum b{color:var(--ink);font-size:1.08rem}
  .track{height:14px;background:var(--soft);border-radius:20px;overflow:hidden;border:1px solid var(--line)}
  .fill{height:100%;border-radius:20px;transition:width .7s cubic-bezier(.4,0,.2,1);position:relative}
  .fill.enf{background:linear-gradient(90deg,#d9594b,#c0392b)} .fill.tx{background:linear-gradient(90deg,#23bf95,#0e8a6b)}
  .fill::after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
        background-size:40px 100%;background-repeat:no-repeat;animation:sheen 2.4s infinite}
  @keyframes sheen{0%{background-position:-40px 0}100%{background-position:calc(100% + 40px) 0}}
  .gpct{font-family:'Kanit';font-weight:700;font-size:.84rem;min-width:48px;text-align:right}
  .mini{display:grid;grid-template-columns:110px 1fr auto;gap:11px;align-items:center;font-size:.79rem;margin-top:10px}
  .mini .mname{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mini .mtrack{height:8px;background:var(--soft);border-radius:10px;overflow:hidden}
  .mini .mfill{height:100%;border-radius:10px}
  /* notes feed */
  .feed{display:flex;flex-direction:column;gap:11px;max-height:360px;overflow:auto}
  .fitem{border:1px solid var(--line);border-radius:13px;padding:12px 14px;background:var(--soft);position:relative}
  .fitem .fhead{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap}
  .chip{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--enfbg);color:var(--enf);font-family:'Kanit'}
  .fitem .fper{font-size:.72rem;color:var(--muted)} .fitem .ftxt{font-size:.88rem;line-height:1.5}
  .fitem .fby{font-size:.71rem;color:var(--muted);margin-top:5px}
  .feedempty{padding:30px;text-align:center;color:var(--muted)}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:.83rem}
  th,td{padding:9px 11px;text-align:right;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;white-space:nowrap}
  th:first-child,td:first-child{text-align:left}
  thead th{background:var(--soft);color:var(--ink2);font-weight:600;font-family:'Kanit';position:sticky;top:0}
  tfoot td{font-weight:700;background:var(--soft);border-top:2px solid var(--line)}
  tbody tr:hover{background:var(--soft)}
  .tablewrap{overflow:auto;border:1px solid var(--line);border-radius:12px;max-height:440px}
  .chartbox{position:relative;height:300px} .chartbox.tall{height:360px}
  .legend{display:flex;gap:16px;flex-wrap:wrap;font-size:.78rem;color:var(--muted);margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:11px;height:11px;border-radius:3px;display:inline-block}
  .note{font-size:.76rem;color:var(--muted);margin-top:10px;line-height:1.5}
  details{margin-bottom:18px}
  details>summary{cursor:pointer;font-family:'Kanit';font-weight:600;font-size:.95rem;padding:14px 20px;
        background:var(--card);border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);
        list-style:none;display:flex;align-items:center;gap:9px}
  details>summary::-webkit-details-marker{display:none}
  details>summary .ic{font-size:1.15rem;color:var(--seize)}
  details[open]>summary{border-radius:14px 14px 0 0}
  details .card{border-radius:0 0 14px 14px;border-top:none}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--card);
         padding:11px 22px;border-radius:11px;font-size:.86rem;opacity:0;transition:.25s;z-index:50;pointer-events:none;font-weight:600}
  .toast.show{opacity:1}
  .loading{text-align:center;padding:70px;color:var(--muted)}
  .spin{width:36px;height:36px;border:3px solid var(--line);border-top-color:var(--navy2);border-radius:50%;
        margin:0 auto 14px;animation:sp 1s linear infinite}@keyframes sp{to{transform:rotate(360deg)}}
  .sechead{font-family:'Kanit';font-weight:700;font-size:1.1rem;margin:6px 2px 12px;display:flex;align-items:center;gap:9px;color:var(--ink)}
  .sechead .ic{font-size:1.3rem;color:var(--enf)}
  .ygrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  @media(max-width:900px){.ygrid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:460px){.ygrid{grid-template-columns:1fr}}
  .ycard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
  .ycard .yhead{display:flex;align-items:center;gap:9px;font-family:'Kanit';font-weight:600;font-size:.92rem}
  .ycard .yhead .ib{width:34px;height:34px;border-radius:10px;display:grid;place-items:center}
  .ycard .yhead .ib .ic{font-size:1.1rem}
  .ycard .yval{font-family:'Kanit';font-weight:700;font-size:1.55rem;margin:11px 0 1px;font-variant-numeric:tabular-nums}
  .ycard .ku{font-size:.7rem;color:var(--muted);font-weight:400}
  .ycard .ymini{height:92px;margin:10px 0 8px}
  .ycard .yvals{display:flex;justify-content:space-between;font-size:.74rem;color:var(--muted);border-top:1px solid var(--line);padding-top:8px}
  .ycard .yvals b{color:var(--ink)}
  .subcard .subhead{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
  .subcard .subcount{font-size:.82rem;color:var(--muted)} .subcard .subcount b{font-size:1.05rem}
  .schips{display:flex;flex-wrap:wrap;gap:8px}
  .schip{font-size:.78rem;font-weight:600;font-family:'Kanit';padding:6px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line)}
  .schip .ic{font-size:.95rem}
  .schip.ok{background:var(--txbg);color:var(--tx);border-color:transparent}
  .schip.miss{background:var(--soft);color:var(--muted)}
  .leaflet-tooltip{font-family:'Sarabun',sans-serif;font-size:.8rem}
  /* ===== TABLET ===== */
  @media(max-width:1024px){
    .wrap{max-width:100%}
    .kpis{grid-template-columns:repeat(3,1fr)}
    .ygrid{grid-template-columns:repeat(2,1fr)}
  }
  @media(max-width:860px){
    .row.r2,.row.r2b{grid-template-columns:1fr}
  }
  /* ===== PRINT (รายงาน PDF) ===== */
  @media print{
    @page{size:A4 landscape;margin:9mm}
    body{background:#fff}
    body *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .htools,.live,.hbtn,.updtxt{display:none!important}
    .hero{box-shadow:none;border-radius:0}
    .filters{box-shadow:none;border:none}
    .card,.ai,.kpi,.ycard{box-shadow:none;break-inside:avoid}
    #map,details,.feed{display:none!important}
    .chartbox{height:220px}
    .row.r2,.row.r2b{grid-template-columns:1fr 1fr!important}
    .ygrid{grid-template-columns:repeat(4,1fr)!important}
    .kpis{grid-template-columns:repeat(3,1fr)!important}
  }
  /* ===== MOBILE ===== */
  @media(max-width:600px){
    .wrap{padding:0 12px 56px}
    .hero{padding:16px 15px 18px;border-radius:0 0 18px 18px}
    .htxt p{font-size:.74rem}
    .crest{width:44px;height:44px;font-size:16px}
    .htools{gap:7px}
    .hbtn{padding:8px 11px}
    .rcell{flex:1 1 calc(50% - 5px);padding:10px 12px}
    .rcell .rv{font-size:1.12rem}
    .ai{padding:18px 15px}
    .ai .aibtns{position:static;margin-bottom:12px;flex-wrap:wrap}
    .ai .copybtn{position:static;margin:0 0 12px}
    .ai h2{font-size:.98rem;flex-wrap:wrap;gap:8px}
    .ai .period{padding-left:0}
    .ai .body{font-size:.9rem;line-height:1.7}
    .card{padding:16px 14px}
    .card .csub{padding-left:0}
    .card h3{font-size:.96rem}
    .sechead{font-size:1rem;margin:4px 2px 10px}
    .kpis{gap:11px}
    .kpi{padding:14px}
    .kpi .k-val{font-size:1.5rem}
    .chartbox{height:260px}.chartbox.tall{height:300px}
    .mini{grid-template-columns:84px 1fr auto;gap:8px}
    .mini .mname{font-size:.74rem}
    .filters{padding:12px 13px;gap:10px}
    .filters .fld{flex:1 1 100%}
    .filters select{width:100%;min-width:0}
    .updtxt{margin-left:0;width:100%}
    details>summary{padding:13px 15px;font-size:.9rem}
    th,td{padding:8px 9px}
  }
</style>
</head>
<body>
<div class="hero">
  <div class="hbar">
    <div class="crest">นภ</div>
    <div class="htxt">
      <h1>ศูนย์ข้อมูลสถานการณ์ยาเสพติด จังหวัดหนองบัวลำภู</h1>
      <p><span id="sh_shield"></span> ศอ.ปส.จ.นภ. • รายงานสถานการณ์รายสัปดาห์ตามแผนปฏิบัติการ (Action Plan)</p>
    </div>
    <div class="htools">
      <span class="live"><span class="pulse"></span><span id="liveTxt">กำลังเชื่อมต่อ…</span></span>
      <button class="hbtn" onclick="refresh(true)"><span id="sh_refresh"></span>รีเฟรช</button>
      <button class="hbtn" onclick="exportCSV()"><span id="sh_dl"></span>CSV</button>
      <button class="hbtn" onclick="window.print()"><span id="sh_pdf"></span>รายงาน PDF</button>
      <button class="hbtn" onclick="toggleTheme()" id="themeBtn"><span id="sh_moon"></span></button>
      <a class="hbtn" href="import.html">⬆ นำเข้า Excel</a>
      <a class="hbtn cta" href="input.html"><span id="sh_pen"></span>กรอกข้อมูล</a>
    </div>
  </div>
  <div class="ribbon" id="ribbon"></div>
</div>

<div class="wrap">
  <div class="filters">
    <div class="fld"><label>ปีงบประมาณ (พ.ศ.)</label><select id="fl_year"></select></div>
    <div class="fld"><label>ช่วงเวลา</label><select id="fl_month"></select></div>
    <div class="fld"><label>สัปดาห์</label><select id="fl_week"></select></div>
    <div class="fld"><label>อำเภอ</label><select id="fl_district"></select></div>
    <span class="updtxt" id="updTxt">—</span>
  </div>

/* ===================== JSONP ===================== */
function jsonp(params){return new Promise((res,rej)=>{
  const cb='cb_'+Math.random().toString(36).slice(2);
  const q=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const s=document.createElement('script');let done=false;
  window[cb]=d=>{done=true;res(d);clean();};
  function clean(){delete window[cb];s.remove();}
  s.onerror=()=>{if(!done){rej(new Error('net'));clean();}};
  s.src=API+'?'+q+'&callback='+cb;document.body.appendChild(s);
  setTimeout(()=>{if(!done){rej(new Error('timeout'));clean();}},20000);
});}

/* ===================== โหลด ===================== */

    document.getElementById('updTxt').innerHTML=ic('refresh')+' อัปเดต '+new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    render();

function buildFilters(){

  if(!years.length)years.push(new Date().getFullYear()+543);
  const fy=document.getElementById('fl_year');fy.innerHTML=years.map(y=>`<option>${y}</option>`).join('');

  const fwk=document.getElementById('fl_week');
  fwk.innerHTML='<option value="0">ทั้งเดือน (รวมทุกสัปดาห์)</option>'+[1,2,3,4,5].map(w=>`<option value="${w}">สัปดาห์ที่ ${w}</option>`).join('');
  const fd=document.getElementById('fl_district');
  fd.innerHTML='<option value="all">ทุกอำเภอ</option>'+DISTRICTS.map(d=>`<option>${d}</option>`).join('');
  [fy,fm,fwk,fd].forEach(el=>{if(!el.dataset.bound){el.addEventListener('change',render);el.dataset.bound=1;}});
}
function sel(){return{year:+document.getElementById('fl_year').value,
                      month:+document.getElementById('fl_month').value,
                      week:+(document.getElementById('fl_week')||{value:0}).value,
                      district:document.getElementById('fl_district').value};}
function sum(rows){const o={};FIELDS.forEach(f=>o[f]=0);rows.forEach(r=>FIELDS.forEach(f=>o[f]+=Number(r[f])||0));return o;}
/* รวมแบบไม่ทบยอด: เก็บค่าล่าสุดต่ออำเภอ (ภาพรวมสะสม) แล้วรวมข้ามอำเภอ */
function aggLatest(rows){const byD={};
  rows.forEach(r=>{const t=(Number(r.year)||0)*10000+(Number(r.month)||0)*100+(Number(r.week)||0);
    if(!byD[r.district]||t>byD[r.district]._t){byD[r.district]=Object.assign({},r,{_t:t});}});
  const o={};FIELDS.forEach(f=>o[f]=0);Object.values(byD).forEach(r=>FIELDS.forEach(f=>o[f]+=Number(r[f])||0));return o;}
function filt(y,m,d,w){return ALL.filter(r=>r.year===y&&(m===0||r.month===m)&&(d==='all'||r.district===d)&&(!w||r.week===w));}

/* ===================== RENDER ===================== */
function render(){

function renderRibbon(c,label){

/* ---------- KPI ---------- */
function delta(c,p){if(!p)return{t:c>0?'ข้อมูลใหม่':'—',c:'flat',a:''};const d=(c-p)/p*100;
  return{t:Math.abs(d).toFixed(1)+'%',c:d>0?'up':d<0?'down':'flat',a:d>0?'▲':d<0?'▼':'—'};}
function kpi(icon,tone,label,unit,val,prev){
  const dd=delta(val,prev);
  return`<div class="kpi"><div class="ibox i-${tone}">${ic(icon)}</div>
    <div class="kmain"><div class="k-top">${label}</div>
    <div class="k-val">${nf(val)} <span class="k-unit">${unit}</span></div>
    <div class="k-delta ${dd.c}">${dd.a} ${dd.t}</div></div></div>`;
}
function kpiCards(c,p){return`<div class="kpis">
  ${kpi('cases','enf','คดีจับกุม','คดี',c.cases,p.cases)}
  ${kpi('suspect','enf','ผู้ต้องหา','คน',c.suspects,p.suspects)}
  ${kpi('dealer','watch','ผู้ค้ารายสำคัญ','ราย',c.dealers,p.dealers)}
  ${kpi('pill','seize','ยาบ้า','เม็ด',c.methPills,p.methPills)}
  ${kpi('ice','seize','ยาไอซ์','กรัม',c.iceGrams,p.iceGrams)}
  ${kpi('treat','tx','นำเข้าบำบัด','คน',c.intoTreatment,p.intoTreatment)}
  ${kpi('done','tx','ผ่าน/สำเร็จการบำบัด','คน',c.completedTreatment,p.completedTreatment)}
  ${kpi('screen','watch','ค้นหา/คัดกรอง (Re-X-ray)','คน',c.xray,p.xray)}
  ${kpi('brain','enf','ผู้มีอาการจิตเวช (SMI-V)','คน',c.psychiatric,p.psychiatric)}
</div>`;}

/* ---------- เป้าหมาย ---------- */
function goalCard(s,yearRows){
  const byD=d=>aggLatest(yearRows.filter(r=>r.district===d));
  const dealTot=aggLatest(yearRows).dealers,treatTot=aggLatest(yearRows).intoTreatment;
  const tgtDeal=s.district==='all'?TARGET_SUM.dealers:(TARGET.dealers[s.district]||0);
  const tgtTreat=s.district==='all'?TARGET_SUM.treat:(TARGET.treat[s.district]||0);
  const pD=tgtDeal?Math.min(dealTot/tgtDeal*100,100):0,pT=tgtTreat?Math.min(treatTot/tgtTreat*100,100):0;
  const mini=(type,map)=>s.district!=='all'?'':DISTRICTS.map(d=>{
    const v=byD(d)[type==='deal'?'dealers':'intoTreatment'],t=map[d]||0,p=t?Math.min(v/t*100,100):0;
    return`<div class="mini"><span class="mname">${d}</span>
      <span class="mtrack"><span class="mfill" style="width:${p}%;background:${type==='deal'?'var(--enf)':'var(--tx)'}"></span></span>
      <span style="color:var(--muted)">${nf(v)}/${nf(t)}</span></div>`;}).join('');
  return`<div class="card">
    <h3 style="color:var(--ink)"><span style="color:var(--enf)">${ic('flag')}</span> ความคืบหน้าเทียบเป้าหมาย</h3>

    <div class="goal">
      <div class="glabel"><span class="gname" style="color:var(--enf)">${ic('shield')} จับกุมผู้ค้ารายสำคัญ</span>
        <span class="gnum"><b>${nf(dealTot)}</b> / ${nf(tgtDeal)} ราย</span></div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="track" style="flex:1"><div class="fill enf" style="width:${pD}%"></div></div>
        <span class="gpct" style="color:var(--enf)">${pD.toFixed(0)}%</span></div>${mini('deal',TARGET.dealers)}</div>
    <div class="goal">
      <div class="glabel"><span class="gname" style="color:var(--tx)">${ic('treat')} นำผู้เสพ/ผู้ติดเข้าบำบัด</span>
        <span class="gnum"><b>${nf(treatTot)}</b> / ${nf(tgtTreat)} คน</span></div>
      <div style="display:flex;gap:10px;align-items:center">
        <div class="track" style="flex:1"><div class="fill tx" style="width:${pT}%"></div></div>
        <span class="gpct" style="color:var(--tx)">${pT.toFixed(0)}%</span></div>${mini('treat',TARGET.treat)}</div>
  </div>`;
}

/* ---------- กราฟแนวโน้ม ---------- */
function trendCard(s){return`<div class="card">
  <h3><span style="color:var(--seize)">${ic('chart')}</span> ${s.month===0?'แนวโน้มรายเดือน':'แนวโน้มรายสัปดาห์ • '+MONTHS[s.month-1]}</h3>
  <p class="csub">คดีจับกุม (แท่ง) • นำเข้าบำบัด (เส้น)</p>
  <div class="chartbox"><canvas id="cTrend"></canvas></div></div>`;}
function drawTrend(s){
  const ctx=document.getElementById('cTrend');if(!ctx)return;
  let labels=[],cases=[],treat=[];
  if(s.month===0){for(let m=1;m<=12;m++){const g=aggLatest(filt(s.year,m,s.district));labels.push(SM[m]);cases.push(g.cases);treat.push(g.intoTreatment);}}
  else{for(let w=1;w<=5;w++){const g=sum(ALL.filter(r=>r.year===s.year&&r.month===s.month&&r.week===w&&(s.district==='all'||r.district===s.district)));
        labels.push('สัปดาห์ '+w);cases.push(g.cases);treat.push(g.intoTreatment);}}
  const barColors=(s.month!==0&&s.week>0)?[1,2,3,4,5].map(w=>w===s.week?cssv('--gold'):cssv('--enf')):cssv('--enf');
  mk('cTrend',{type:'bar',data:{labels,datasets:[
    {label:'คดีจับกุม',data:cases,backgroundColor:barColors,borderRadius:6,maxBarThickness:36},
    {label:'นำเข้าบำบัด',data:treat,type:'line',borderColor:cssv('--tx'),backgroundColor:cssv('--tx'),tension:.35,borderWidth:2.6,pointRadius:3,fill:false}
  ]},options:baseOpt()});
}

/* ---------- รายอำเภอ ---------- */
function districtChartCard(s){return`<div class="card">
  <h3><span style="color:var(--seize)">${ic('building')}</span> เปรียบเทียบรายอำเภอ</h3>
  <p class="csub">${s.month===0?'สะสมทั้งปี '+s.year:MONTHS[s.month-1]+' '+s.year}</p>
  <div class="chartbox tall"><canvas id="cDist"></canvas></div></div>`;}
function drawDistrict(s){
  if(!document.getElementById('cDist'))return;
  const rows=DISTRICTS.map(d=>aggLatest(filt(s.year,s.month,d,s.week)));
  mk('cDist',{type:'bar',data:{labels:DISTRICTS,datasets:[
    {label:'คดีจับกุม',data:rows.map(r=>r.cases),backgroundColor:cssv('--enf'),borderRadius:5},
    {label:'นำเข้าบำบัด',data:rows.map(r=>r.intoTreatment),backgroundColor:cssv('--tx'),borderRadius:5}
  ]},options:baseOpt({indexAxis:'y'})});
}

/* ---------- บันทึกเหตุการณ์ (notes) ---------- */
function notesCard(s){
  const rows=filt(s.year,s.month,s.district,s.week).filter(r=>r.notes&&String(r.notes).trim())
            .sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||''));
  const body=rows.length?rows.map(r=>`<div class="fitem">
    <div class="fhead"><span class="chip">${r.district}</span>
      <span class="fper">${ic('calendar')} ${SM[r.month]} ${r.year} • สัปดาห์ ${r.week}</span></div>
    <div class="ftxt">${esc(r.notes)}</div>
    <div class="fby">โดย ${esc(r.updatedBy||'-')} • ${fmtTime(r.updatedAt)}</div></div>`).join('')
    :`<div class="feedempty">— ยังไม่มีบันทึกเหตุการณ์ในช่วงที่เลือก —</div>`;
  return`<div class="card">
    <h3><span style="color:var(--watch)">${ic('note')}</span> บันทึกเหตุการณ์สำคัญรายสัปดาห์</h3>
    <p class="csub">เหตุการณ์/ปฏิบัติการเด่นที่เจ้าหน้าที่รายงาน</p>
    <div class="feed">${body}</div></div>`;
}

/* ---------- เปรียบเทียบรายปี 4 ตัวชี้วัด ---------- */
const YM=[
 {key:'cases',label:'จำนวนคดี',unit:'คดี',color:'--enf',icon:'cases',tone:'enf'},
 {key:'suspects',label:'จำนวนผู้ต้องหา',unit:'คน',color:'--watch',icon:'suspect',tone:'watch'},
 {key:'meth',label:'ยาบ้า',unit:'เม็ด',color:'--seize',icon:'pill',tone:'seize'},
 {key:'ice',label:'ยาไอซ์',unit:'กรัม',color:'--tx',icon:'ice',tone:'tx'}
];
function pctTxt(c,p){if(!p)return'<span class="flat">—</span>';const d=(c-p)/p*100;const cls=d>0?'up':d<0?'down':'flat';
  return `<span class="${cls}" style="font-weight:600">${d>0?'▲':d<0?'▼':'—'} ${Math.abs(d).toFixed(1)}%</span>`;}
function yearCompareSection(){
  const yrs=[2567,2568,2569];
  const cards=YM.map(M=>{
    const v=yrs.map(y=>HIST[y][M.key]);
    const d=v[1]?((v[2]-v[1])/v[1]*100):null;
    const dcls=d===null?'flat':(d>0?'up':d<0?'down':'flat');
    const dtxt=d===null?'—':(d>0?'▲':d<0?'▼':'—')+' '+Math.abs(d).toFixed(1)+'%';
    return`<div class="ycard">
      <div class="yhead"><span class="ib i-${M.tone}">${ic(M.icon)}</span><span>${M.label}</span></div>
      <div class="yval">${nf(v[2])} <span class="ku">${M.unit}</span></div>
      <div class="k-delta ${dcls}" style="font-size:.77rem">${dtxt} <span style="color:var(--muted);font-weight:400">เทียบปี 2568</span></div>
      <div class="ymini"><canvas id="ym_${M.key}"></canvas></div>
      <div class="yvals"><span>2567: <b>${nf(v[0])}</b></span><span>2568: <b>${nf(v[1])}</b></span><span>2569: <b>${nf(v[2])}</b></span></div>
    </div>`;
  }).join('');
  const trow=M=>`<tr><td>${M.label} (${M.unit})</td>${[2567,2568,2569].map(y=>`<td>${nf(HIST[y][M.key])}</td>`).join('')}<td>${pctTxt(HIST[2569][M.key],HIST[2568][M.key])}</td></tr>`;
  return`<div class="sechead">${ic('chart')} เปรียบเทียบรายปี (ปีงบประมาณ 2567–2569)</div>
    <div class="ygrid">${cards}</div>
    <div class="card" style="margin:16px 0 18px">
      <h3><span style="color:var(--seize)">${ic('chart')}</span> ตารางเปรียบเทียบรายปี</h3>
      <p class="csub">คดี / ผู้ต้องหา / ยาบ้า / ไอซ์ และอัตราเปลี่ยนแปลงปี 2569 เทียบ 2568</p>
      <div class="tablewrap"><table>
        <thead><tr><th>ตัวชี้วัด</th><th>ปี 2567</th><th>ปี 2568</th><th>ปี 2569</th><th>เปลี่ยนแปลง (69/68)</th></tr></thead>
        <tbody>${YM.map(trow).join('')}</tbody>
      </table></div>
      <p class="note">${ic('alert')} คำนวณจากผลรวมรายอำเภอตามแผนปฏิบัติการ</p></div>`;
}
function drawYearMetrics(){
  const yrs=[2567,2568,2569];
  YM.forEach(M=>{const id='ym_'+M.key;if(!document.getElementById(id))return;
    const base=cssv(M.color);
    mk(id,{type:'line',data:{labels:['2567','2568','2569'],datasets:[{data:yrs.map(y=>HIST[y][M.key]),
      borderColor:base,backgroundColor:base+'22',tension:.3,borderWidth:2.6,fill:true,
      pointRadius:4,pointBackgroundColor:base,pointBorderColor:'#fff',pointBorderWidth:1.5}]},
      options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>nf(c.raw)+' '+M.unit}}},
        scales:{x:{ticks:{font:{family:'Sarabun',size:10},color:cssv('--muted')},grid:{display:false}},
          y:{display:false,beginAtZero:true}}}});
  });
}

/* ---------- ส่วนข้อมูลตามแผนปฏิบัติการ (ตัวเลขจริง) ---------- */

    return`<tr><td>${d}</td>

    <p class="csub">จำนวนคดี / ยาบ้า (เม็ด) / ไอซ์ (กรัม) แยกตามปีงบประมาณ</p>
    <div class="tablewrap"><table>

        <tr><th>คดี</th><th>ยาบ้า</th><th>ไอซ์</th><th>คดี</th><th>ยาบ้า</th><th>ไอซ์</th><th>คดี</th><th>ยาบ้า</th><th>ไอซ์</th></tr>
      </thead>
      <tbody>${aRows}</tbody>
      <tfoot><tr><td>รวมทั้งจังหวัด</td>
        <td>${nf(HIST[2567].cases)}</td><td>${nf(HIST[2567].meth)}</td><td>${HIST[2567].ice.toLocaleString('th-TH')}</td>
        <td>${nf(HIST[2568].cases)}</td><td>${nf(HIST[2568].meth)}</td><td>${HIST[2568].ice.toLocaleString('th-TH')}</td>
        <td>${nf(HIST[2569].cases)}</td><td>${nf(HIST[2569].meth)}</td><td>${HIST[2569].ice.toLocaleString('th-TH')}</td></tr></tfoot>
    </table></div>
    <p class="note">${ic('alert')} ปี 2569 ปริมาณยาบ้ารวมสูงถึง ${nf(HIST[2569].meth)} เม็ด เพิ่มขึ้นมากจากปีก่อน สะท้อนการลักลอบลำเลียงปริมาณมากผ่านพื้นที่</p>
  </div>
  <div class="row r2b">
    <div class="card">

      <p class="csub">ผลงานปี 2567–2568 และเป้า/ผล/ร้อยละ ปี 2569</p>

        <tbody>${tRows}</tbody>
        <tfoot><tr><td>รวม</td><td>2,377</td><td>2,153</td><td>2,175</td><td>1,187</td><td style="font-weight:700">63.72%</td></tr></tfoot>

    <div class="card">

        <thead><tr><th>อำเภอ</th><th>จับกุมผู้ค้า (ราย)</th><th>บำบัดฟื้นฟู (คน)</th></tr></thead>

/* ---------- ตารางสรุปรายอำเภอ (ครบทุกฟิลด์) ---------- */
function tableCard(s){
  const rows=DISTRICTS.map(d=>({d,g:aggLatest(filt(s.year,s.month,d,s.week))}));
  const tot=aggLatest(filt(s.year,s.month,'all',s.week));
  const row=(name,g)=>`<tr><td>${name}</td><td>${nf(g.cases)}</td><td>${nf(g.suspects)}</td><td>${nf(g.dealers)}</td>
    <td>${nf(g.methPills)}</td><td>${g.iceGrams.toLocaleString('th-TH')}</td><td>${nf(g.intoTreatment)}</td>
    <td>${nf(g.completedTreatment)}</td><td>${nf(g.xray)}</td><td>${nf(g.psychiatric)}</td></tr>`;
  return`<div class="card" style="margin-bottom:18px">
    <h3><span style="color:var(--enf)">${ic('cases')}</span> ตารางสรุปรายอำเภอ (ครบทุกตัวชี้วัด)</h3>
    <p class="csub">${s.month===0?'สะสมทั้งปี '+s.year:(s.week>0?'สัปดาห์ '+s.week+' • ':'')+MONTHS[s.month-1]+' '+s.year}${s.district!=='all'?' • '+s.district:''}</p>
    <div class="tablewrap"><table>
      <thead><tr><th>อำเภอ</th><th>คดี</th><th>ผู้ต้องหา</th><th>ผู้ค้า</th><th>ยาบ้า(เม็ด)</th><th>ไอซ์(ก.)</th>
        <th>นำเข้าบำบัด</th><th>สำเร็จ</th><th>คัดกรอง</th><th>จิตเวช</th></tr></thead>
      <tbody>${rows.map(({d,g})=>row(d,g)).join('')}</tbody>
      <tfoot>${row('รวมทั้งจังหวัด',tot)}</tfoot>
    </table></div></div>`;
}

    <td>${SM[r.month]} ${r.year} • ส.${r.week}</td><td>${r.district}</td>
    <td>${nf(r.cases)}</td><td>${nf(r.suspects)}</td><td>${nf(r.dealers)}</td><td>${nf(r.methPills)}</td>

        <th>บำบัด</th><th>สำเร็จ</th><th>คัดกรอง</th><th>จิตเวช</th><th>หมายเหตุ</th><th>ผู้กรอก</th></tr></thead>
      <tbody>${body}</tbody></table></div></div></details>`;
}

/* ---------- สถานะการส่งข้อมูลรายสัปดาห์ ---------- */
function submissionCard(s){
  const scope=filt(s.year,s.month,'all',s.week);
  let maxT=-1,per=null;
  scope.forEach(r=>{const t=r.year*10000+r.month*100+r.week;if(t>maxT){maxT=t;per={y:r.year,m:r.month,w:r.week};}});
  let chips,done=0,perLabel='—';
  if(!per){chips=DISTRICTS.map(d=>`<span class="schip miss">${ic('clock')} ${d}</span>`).join('');}
  else{
    perLabel=`${SM[per.m]} ${per.y} • สัปดาห์ ${per.w}`;
    const sub=new Set(scope.filter(r=>r.year===per.y&&r.month===per.m&&r.week===per.w).map(r=>r.district));
    done=sub.size;
    chips=DISTRICTS.map(d=>sub.has(d)
      ?`<span class="schip ok">${ic('check')} ${d}</span>`
      :`<span class="schip miss">${ic('clock')} ${d}</span>`).join('');
  }
  const pctDone=Math.round(done/DISTRICTS.length*100);
  return`<div class="card subcard">
    <div class="subhead">
      <h3 style="margin:0"><span style="color:var(--tx)">${ic('check')}</span> สถานะการส่งข้อมูลรายสัปดาห์</h3>
      <div class="subcount"><b style="color:${done===6?'var(--tx)':done>0?'var(--watch)':'var(--enf)'}">${done}/6</b> อำเภอ • รอบ ${perLabel}</div>
    </div>
    <div class="track" style="margin:10px 0 14px"><div class="fill tx" style="width:${pctDone}%"></div></div>
    <div class="schips">${chips}</div></div>`;
}

/* ---------- แผนที่รายอำเภอ (choropleth) ---------- */
let GEO=null;
function mapCard(){return`<div class="card">
  <h3><span style="color:var(--seize)">${ic('building')}</span> แผนที่ความเข้มข้นรายอำเภอ</h3>
  <p class="csub">จำนวนคดีจับกุม (เข้ม=มาก) • แตะพื้นที่เพื่อดูรายละเอียด</p>
  <div id="map" style="height:340px;border-radius:12px;overflow:hidden;border:1px solid var(--line)"></div>
  <p class="note" id="mapNote" style="display:none">${ic('alert')} ไม่สามารถโหลดขอบเขตอำเภอได้ในขณะนี้ (ต้องมีอินเทอร์เน็ต)</p></div>`;}
function valByDistrict(s){const o={};DISTRICTS.forEach(d=>{o[d]=aggLatest(filt(s.year,s.month,d,s.week)).cases;});return o;}
function colorFor(v,max){if(!v)return'#e7ecf5';const t=max?Math.min(v/max,1):0;
  const stops=[[255,237,160],[254,178,76],[240,59,32],[150,20,15]];
  const seg=Math.min(Math.floor(t*3),2),fr=(t*3)-seg,a=stops[seg],b=stops[seg+1];
  const c=a.map((x,i)=>Math.round(x+(b[i]-x)*fr));return`rgb(${c[0]},${c[1]},${c[2]})`;}
function styleMatch(props){const vals=Object.values(props).map(v=>String(v).trim());
  for(const d of DISTRICTS){if(vals.some(v=>v===d||v==='อำเภอ'+d||v.replace('อ.','').trim()===d))return d;}return null;}
async function drawMap(s){
  const el=document.getElementById('map');if(!el||el._leaflet_id||typeof L==='undefined')return;
  const map=L.map(el,{scrollWheelZoom:false,attributionControl:false}).setView([17.22,102.44],9);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{maxZoom:18}).addTo(map);
  setTimeout(()=>map.invalidateSize(),250);
  try{
    if(!GEO){
      const res=await fetch('https://raw.githubusercontent.com/pcrete/gsvloader-demo/master/geojson/Amphoe.geojson');
      const all=await res.json();
      let fts=all.features.filter(ft=>Object.values(ft.properties).some(v=>String(v).trim()==='หนองบัวลำภู'));
      if(!fts.length)fts=all.features.filter(ft=>styleMatch(ft.properties));
      GEO={type:'FeatureCollection',features:fts};
    }
    if(!GEO.features.length){document.getElementById('mapNote').style.display='block';return;}
    const vmap=valByDistrict(s),max=Math.max(1,...Object.values(vmap));
    const layer=L.geoJSON(GEO,{
      style:ft=>{const d=styleMatch(ft.properties);return{fillColor:colorFor(d?vmap[d]:0,max),weight:1.3,color:'#fff',fillOpacity:.85};},
      onEachFeature:(ft,ly)=>{const d=styleMatch(ft.properties);if(d){const g=aggLatest(filt(s.year,s.month,d,s.week));
        ly.bindTooltip(`<b>${d}</b><br>คดี ${nf(g.cases)} • บำบัด ${nf(g.intoTreatment)}<br>ยาบ้า ${nf(g.methPills)} เม็ด`,{sticky:true});}}
    }).addTo(map);
    try{map.fitBounds(layer.getBounds(),{padding:[12,12]});}catch(e){}
  }catch(e){const n=document.getElementById('mapNote');if(n)n.style.display='block';}
}

/* ===================== AI สรุป ===================== */
function aiSummary(s,c,p,curLabel,prevLabel,ySum,curRows){
  const lines=[],plain=[];const has=curRows.length>0;
  const scope=s.district==='all'?'ทั้งจังหวัด':'อำเภอ'+s.district;
  if(!has){lines.push({t:`ยัง<b>ไม่มีข้อมูล</b>สำหรับ ${curLabel} (${scope}) — กรุณากรอกข้อมูลผ่านระบบเพื่อให้แดชบอร์ดประมวลผล`});}
  else{
    lines.push({t:`สถานการณ์ ${scope} ช่วง <b>${curLabel}</b>: จับกุม <span class="hl">${nf(c.cases)} คดี</span> ผู้ต้องหา ${nf(c.suspects)} คน • นำผู้เสพเข้าบำบัด <span class="hl">${nf(c.intoTreatment)} คน</span> (สำเร็จ ${nf(c.completedTreatment)}) • ของกลางยาบ้า ${nf(c.methPills)} เม็ด ไอซ์ ${c.iceGrams.toLocaleString('th-TH')} กรัม`});
    plain.push(`ภาพรวม ${scope} ${curLabel}: คดี ${nf(c.cases)} | ผู้ต้องหา ${nf(c.suspects)} | บำบัด ${nf(c.intoTreatment)} (สำเร็จ ${nf(c.completedTreatment)}) | ยาบ้า ${nf(c.methPills)} เม็ด | ไอซ์ ${c.iceGrams} ก.`);
    if(p&&(p.cases||p.intoTreatment)){
      const dc=pct(c.cases,p.cases),dt=pct(c.intoTreatment,p.intoTreatment);
      lines.push({t:`เทียบ ${prevLabel}: คดีจับกุม${arrow(dc)} <b>${absT(dc)}</b> • การนำเข้าบำบัด${arrow(dt)} <b>${absT(dt)}</b>`});
      plain.push(`เทียบ ${prevLabel}: คดี ${arrowT(dc)}${absT(dc)}, บำบัด ${arrowT(dt)}${absT(dt)}`);
    }
    if(s.district==='all'){
      const byD=DISTRICTS.map(d=>({d,g:aggLatest(curRows.filter(r=>r.district===d))}));
      const tc=[...byD].sort((a,b)=>b.g.cases-a.g.cases)[0],tt=[...byD].sort((a,b)=>b.g.intoTreatment-a.g.intoTreatment)[0];
      if(tc.g.cases>0)lines.push({t:`พื้นที่จับกุมสูงสุด: <span class="hl">${tc.d}</span> (${nf(tc.g.cases)} คดี) • นำเข้าบำบัดสูงสุด: <span class="hl">${tt.d}</span> (${nf(tt.g.intoTreatment)} คน)`});
      if(tc.g.cases>0)plain.push(`จับกุมสูงสุด: ${tc.d} ${nf(tc.g.cases)} คดี | บำบัดสูงสุด: ${tt.d} ${nf(tt.g.intoTreatment)} คน`);
    }
    const tgtDeal=s.district==='all'?TARGET_SUM.dealers:(TARGET.dealers[s.district]||0);
    const tgtTreat=s.district==='all'?TARGET_SUM.treat:(TARGET.treat[s.district]||0);
    const pD=tgtDeal?ySum.dealers/tgtDeal*100:0,pT=tgtTreat?ySum.intoTreatment/tgtTreat*100:0;
    lines.push({t:`ความคืบหน้าสะสมเทียบเป้า: จับกุมผู้ค้า <b>${pD.toFixed(0)}%</b> (${nf(ySum.dealers)}/${nf(tgtDeal)}) • บำบัดฟื้นฟู <b>${pT.toFixed(0)}%</b> (${nf(ySum.intoTreatment)}/${nf(tgtTreat)})`});
    plain.push(`คืบหน้าเป้า: ผู้ค้า ${pD.toFixed(0)}% | บำบัด ${pT.toFixed(0)}%`);
    const w=[];
    if(pT<50)w.push('การบำบัดต่ำกว่าครึ่งของเป้า ควรเร่งคัดกรองและนำผู้เสพเข้าระบบ');
    if(pD<50)w.push('การจับกุมผู้ค้ายังห่างเป้า ควรเร่งสืบสวนขยายผลเครือข่าย');
    if(c.psychiatric>0)w.push(`พบผู้มีอาการจิตเวช (SMI-V) ${nf(c.psychiatric)} คน — ติดตามดูแลต่อเนื่องเพื่อลดความเสี่ยงในชุมชน`);
    if(w.length){lines.push({t:`<span class="hl">ข้อควรเร่งรัด:</span> ${w.join(' • ')}`,warn:true});plain.push('ข้อควรเร่งรัด: '+w.join('; '));}
    const ev=curRows.filter(r=>r.notes&&String(r.notes).trim()).map(r=>`${r.district}: ${String(r.notes).trim()}`);
    if(ev.length){lines.push({t:`เหตุการณ์สำคัญ: ${ev.slice(0,3).join(' / ')}${ev.length>3?' …':''}`});plain.push('เหตุการณ์สำคัญ: '+ev.slice(0,3).join(' / '));}
  }
  window.__plain=`สรุปสถานการณ์ยาเสพติด จ.หนองบัวลำภู — ${curLabel} (${scope})\n`+plain.map(x=>'• '+x).join('\n')+`\n(ออกรายงานโดยระบบแดชบอร์ด ${new Date().toLocaleString('th-TH')})`;
  window.__aiStats={ช่วงเวลา:curLabel,พื้นที่:scope,คดีจับกุม:c.cases,ผู้ต้องหา:c.suspects,ผู้ค้ารายสำคัญ:c.dealers,
    ยาบ้าเม็ด:c.methPills,ไอซ์กรัม:c.iceGrams,นำเข้าบำบัด:c.intoTreatment,สำเร็จบำบัด:c.completedTreatment,
    คัดกรอง:c.xray,จิตเวช:c.psychiatric,สะสมผู้ค้าทั้งปี:ySum.dealers,สะสมบำบัดทั้งปี:ySum.intoTreatment};
  return`<div class="ai">
    <div class="aibtns">
      <button class="copybtn" onclick="copyReport()">${ic('note')} คัดลอก</button>
      <button class="copybtn" onclick="aiAdvanced(this)">${ic('ai')} สรุปด้วย AI ขั้นสูง</button>
    </div>
    <h2><span class="iccirc">${ic('ai')}</span> บทสรุปผู้บริหาร <span class="badge">AI วิเคราะห์อัตโนมัติ</span></h2>
    <p class="period">${curLabel} • ${scope}</p>
    <div class="body" id="aiBody">${lines.map(l=>`<span class="ln${l.warn?' warn':''}">${l.t}</span>`).join('')}</div></div>`;
}
function copyReport(){navigator.clipboard.writeText(window.__plain||'').then(()=>toast('คัดลอกรายงานสำหรับส่งต่อแล้ว'));}
async function aiAdvanced(btn){
  btn.disabled=true;const orig=btn.innerHTML;btn.innerHTML='⏳ กำลังประมวลผล...';
  try{
    const d=await jsonp({action:'ai',data:JSON.stringify(window.__aiStats||{})});
    if(d.ok&&d.summary){
      const body=document.getElementById('aiBody');
      body.innerHTML=d.summary.split(/\n+/).filter(x=>x.trim()).map(x=>`<span class="ln">${x.replace(/[<>]/g,'')}</span>`).join('');
      toast('สรุปด้วย AI ขั้นสูงแล้ว');
    }else toast(d.error||'AI ขั้นสูงยังไม่พร้อม (ตั้งค่า ANTHROPIC_KEY)');
  }catch(e){toast('เชื่อมต่อ AI ไม่สำเร็จ');}
  finally{btn.disabled=false;btn.innerHTML=orig;}
}

/* ===================== utils ===================== */
function pct(c,p){return p?(c-p)/p*100:null;}
function absT(d){return d===null?'(ใหม่)':Math.abs(d).toFixed(1)+'%';}
function arrow(d){return d===null?'':d>0?' เพิ่มขึ้น':d<0?' ลดลง':' คงที่';}
function arrowT(d){return d===null?'+':d>0?'▲':d<0?'▼':'=';}
function nf(v){return (Number(v)||0).toLocaleString('th-TH');}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function fmtTime(iso){if(!iso)return'-';const d=new Date(iso);return d.toLocaleDateString('th-TH',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'});}
function cssv(n){return getComputedStyle(document.body).getPropertyValue(n).trim()||'#888';}
function baseOpt(extra){return Object.assign({responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{font:{family:'Sarabun',size:12},color:cssv('--ink2'),boxWidth:13,padding:14}}},
  scales:{x:{ticks:{font:{family:'Sarabun',size:11},color:cssv('--muted')},grid:{display:false}},
          y:{ticks:{font:{family:'Sarabun',size:11},color:cssv('--muted')},grid:{color:cssv('--line')},beginAtZero:true}}},extra||{});}
function mk(id,cfg){if(charts[id])charts[id].destroy();charts[id]=new Chart(document.getElementById(id),cfg);}
function toast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}
function toggleTheme(){const d=document.body.getAttribute('data-theme')==='dark';
  document.body.setAttribute('data-theme',d?'light':'dark');paintStatic();render();}
function exportCSV(){
  const head=['ปี','เดือน','สัปดาห์','อำเภอ','คดี','ผู้ต้องหา','ผู้ค้า','ยาบ้า_เม็ด','ไอซ์_กรัม','นำเข้าบำบัด','ผ่านบำบัด','คัดกรอง','จิตเวช','หมายเหตุ','ผู้กรอก','อัปเดต'];
  const lines=ALL.map(r=>[r.year,r.month,r.week,r.district,r.cases,r.suspects,r.dealers,r.methPills,r.iceGrams,
    r.intoTreatment,r.completedTreatment,r.xray,r.psychiatric,'"'+String(r.notes||'').replace(/"/g,'""')+'"','"'+String(r.updatedBy||'').replace(/"/g,'""')+'"',r.updatedAt]);
  const csv='\uFEFF'+[head,...lines].map(a=>a.join(',')).join('\n');
  const b=new Blob([csv],{type:'text/csv;charset=utf-8'}),u=URL.createObjectURL(b),a=document.createElement('a');
  a.href=u;a.download='drug_situation_nbl_'+Date.now()+'.csv';a.click();URL.revokeObjectURL(u);toast('ส่งออก CSV แล้ว');
}

paintStatic();
refresh(false);
setInterval(()=>refresh(false),REFRESH_MS);
